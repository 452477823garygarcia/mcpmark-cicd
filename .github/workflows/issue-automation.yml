name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Run issue triage automation
        uses: actions/github-script@v7
        with:
          script: |
            const { issue } = context.payload;
            const { owner, repo } = context.repo;
            const issueNumber = issue.number;
            const title = issue.title.toLowerCase();
            const body = issue.body ? issue.body.toLowerCase() : "";

            // Add initial needs-triage label if not already present
            const currentLabels = issue.labels.map(l => l.name);
            if (!currentLabels.includes("needs-triage")) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: ["needs-triage"]
              });
            }

            // Apply category labels based on title keywords
            const categoryLabels = [];
            if (title.includes("bug")) categoryLabels.push("bug");
            if (title.includes("epic")) categoryLabels.push("epic");
            if (title.includes("maintenance")) categoryLabels.push("maintenance");

            if (categoryLabels.length > 0) {
              // Add missing category labels
              const missingCategories = categoryLabels.filter(label => !currentLabels.includes(label));
              if (missingCategories.length > 0) {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  labels: missingCategories
                });
              }
            }

            // Apply priority labels (highest priority first)
            const priorityRules = [
              { keywords: ["critical", "urgent", "production", "outage"], label: "priority-critical" },
              { keywords: ["important", "high", "blocking"], label: "priority-high" },
              { keywords: ["low", "nice-to-have", "minor"], label: "priority-low" },
              { keywords: ["medium", "normal"], label: "priority-medium" }
            ];

            let priorityLabel = "priority-medium"; // Default priority
            for (const rule of priorityRules) {
              const hasKeyword = rule.keywords.some(k => title.includes(k) || body.includes(k));
              if (hasKeyword) {
                priorityLabel = rule.label;
                break; // Use highest matching priority
              }
            }

            // Add priority label if not already present
            if (!currentLabels.includes(priorityLabel)) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: [priorityLabel]
              });
            }

  task-breakdown:
    runs-on: ubuntu-latest
    needs: issue-triage
    permissions:
      issues: write
    if: ${{ contains(github.event.issue.title, 'Epic') || contains(github.event.issue.title, 'epic') }}
    steps:
      - name: Create epic subtasks
        uses: actions/github-script@v7
        with:
          script: |
            const { issue } = context.payload;
            const { owner, repo } = context.repo;
            const parentNumber = issue.number;
            const parentTitle = issue.title;

            // Define subtask details
            const subtasks = [
              { name: "Requirements Analysis" },
              { name: "Design and Architecture" },
              { name: "Implementation" },
              { name: "Testing and Documentation" }
            ];

            // Create subtasks and track their numbers
            const subtaskNumbers = [];
            for (let i = 0; i < subtasks.length; i++) {
              const taskIndex = i + 1;
              const taskName = subtasks[i].name;
              const subtaskTitle = `[SUBTASK] ${parentTitle} - Task ${taskIndex}: ${taskName}`;
              const subtaskBody = `Related to #${parentNumber}`;

              // Create subtask with required labels
              const createdSubtask = await github.rest.issues.create({
                owner,
                repo,
                title: subtaskTitle,
                body: subtaskBody,
                labels: ["enhancement", "needs-review"]
              });

              subtaskNumbers.push(createdSubtask.data.number);
            }

            // Update parent issue with epic tasks checklist
            let updatedBody = issue.body || "";
            updatedBody += `\n\n## Epic Tasks\n`;
            subtaskNumbers.forEach(num => {
              updatedBody += `- [ ] #${num}\n`;
            });

            await github.rest.issues.update({
              owner,
              repo,
              issue_number: parentNumber,
              body: updatedBody
            });

  auto-response:
    runs-on: ubuntu-latest
    needs: [issue-triage, task-breakdown]
    permissions:
      issues: write
    steps:
      - name: Run auto-response and finalization
        uses: actions/github-script@v7
        with:
          script: |
            const { issue } = context.payload;
            const { owner, repo } = context.repo;
            const issueNumber = issue.number;
            const author = issue.user.login;
            const currentLabels = issue.labels.map(l => l.name.toLowerCase());

            // 1. Check if this is the author's first issue in the repo
            const authorIssues = await github.rest.issues.listForRepo({
              owner,
              repo,
              creator: author,
              state: "all"
            });
            const isFirstIssue = authorIssues.data.length === 1; // Current issue is the only one

            // Add first-time-contributor label if applicable
            if (isFirstIssue && !currentLabels.includes("first-time-contributor")) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: ["first-time-contributor"]
              });
            }

            // 2. Generate appropriate response based on issue type
            let responseContent = "";
            if (currentLabels.includes("bug")) {
              responseContent = `### Bug Report Guidelines\nPlease follow these guidelines to help us address your bug report:\n- Provide clear, step-by-step instructions to reproduce the issue\n- Describe the **expected behavior** vs. the **actual behavior** you observed\n- Include details about your environment (Node.js version, OS, etc.)\n- Add screenshots, error messages, or logs if available`;
            } else if (currentLabels.includes("epic")) {
              responseContent = `### Feature Request Process\nFor this epic feature request, please ensure you:\n- Define clear requirements and success criteria\n- Outline the proposed architecture/design (if applicable)\n- Plan implementation phases and dependencies\n- Include testing and documentation requirements`;
            } else if (currentLabels.includes("maintenance")) {
              responseContent = `### Maintenance Guidelines\nFor this maintenance task, please include:\n- A clear scope of the work to be done\n- Any dependencies or prerequisites for the task\n- The expected impact or benefit of completing this work\n- Any related issues or pull requests`;
            }

            // Add welcome message for first-time contributors
            if (isFirstIssue) {
              responseContent = `Welcome to the repository, @${author}! This is your first issue here - thank you for contributing!\n\n${responseContent}`;
            }

            // Post the response comment
            if (responseContent) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: responseContent
              });
            }

            // 3. Set milestone for high/critical priority issues
            if (currentLabels.includes("priority-high") || currentLabels.includes("priority-critical")) {
              // Find or create v1.0.0 milestone
              let milestone = await github.rest.issues.listMilestones({
                owner,
                repo,
                state: "open"
              }).then(res => res.data.find(m => m.title === "v1.0.0"));

              if (!milestone) {
                milestone = await github.rest.issues.createMilestone({
                  owner,
                  repo,
                  title: "v1.0.0",
                  description: "Milestone for version 1.0.0 deliverables"
                }).then(res => res.data);
              }

              // Assign milestone to issue
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issueNumber,
                milestone: milestone.number
              });
            }

            // 4. Update status: remove needs-triage, add needs-review
            if (currentLabels.includes("needs-triage")) {
              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number: issueNumber,
                name: "needs-triage"
              });
            }

            if (!currentLabels.includes("needs-review")) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: ["needs-review"]
              });
            }
